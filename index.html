<!DOCTYPE html>
<html>
<head>
 <title>Hashing Tool</title>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
 <h1>Hashing Tool</h1>
 <label for="input">Voer tekst in:</label>
 <input type="text" id="input" oninput="generateHash()">
 <p>Hashwaarde (https://www.google.com/maps/place/Ardgay,+Verenigd+Koninkrijk/@57.8812948,-4.3635957,18.33z/data=!4m6!3m5!1s0x488f924459f7c47d:0xd9253504fc4c9e69!8m2!3d57.881213!4d-4.363214!16s%2Fm%2F04n7p3l?entry=ttu&g_ep=EgoyMDI2MDIyMy4wIKXMDSoASAFQAw%3D%3D):</p>
 <textarea id="output" rows="4" cols="50" readonly></textarea>
 <script>
 function generateHash() {
 var input = document.getElementById("input").value;
 var hash = CryptoJS.SHA256(input);
 document.getElementById("output").value = hash;
 }
 </script>
</body>
</html>
